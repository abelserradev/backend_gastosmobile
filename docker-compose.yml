# API + Postgres en red `gastos_network`. Coolify: variables en el panel deben coincidir con ${...} abajo.
# Postgres gestionado aparte en Coolify: borra el servicio `postgres` y `depends_on` del backend, define DATABASE_URL.
#
# Local: docker compose --env-file .env.production up -d --build

name: gastos-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Caracas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gastos_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure:5
    dns:
      - 8.8.4.4
      - 8.8.8.8
    ports:
      - "${BACKEND_PORT:-3088}:3088"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3088}
      TZ: ${TZ:-America/Caracas}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      DOLARAPI_BASE_URL: ${DOLARAPI_BASE_URL:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gastos_network

volumes:
  postgres_data:

networks:
  gastos_network:
    driver: bridge
