# Imagen API para producción / Coolify (solo backend). No incluye Postgres: la BD es externa o otro stack.
# Variables en runtime las inyecta Coolify (DATABASE_URL, JWT_SECRET, FRONTEND_URL, etc.).
# Desarrollo con Postgres local: usar docker-compose.dev.yml

name: gastos-backend

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastos-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3088}:3088"
