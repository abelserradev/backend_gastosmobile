name: gastos-backend

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gastos-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: 1
    volumes:
      - ollama_data:/root/.ollama
    # GPU NVIDIA: requiere NVIDIA Container Toolkit en el host del servidor.
    # Si el validador de Coolify rechaza "deploy:", usa Custom Docker Options: --gpus all.
    # Con Quadro P600 (2GB VRAM) usa OLLAMA_MODEL=glm-ocr:q8_0 para reducir el modelo a ~1.6GB.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      coolify:
        aliases:
          - ollama
          - gastos-ollama
    # No publicar 11434 en Internet; solo red interna Coolify.

  ollama-pull:
    image: ollama/ollama:latest
    container_name: gastos-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama pull "${OLLAMA_MODEL:-glm-ocr}" || exit 1
    restart: 'no'
    networks:
      - coolify

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure:5
    dns:
      - 8.8.4.4
      - 8.8.8.8
    ports:
      - "${BACKEND_PORT:-3088}:3088"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3088}
      TZ: ${TZ:-America/Caracas}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      DOLARAPI_BASE_URL: ${DOLARAPI_BASE_URL:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # No uses localhost aquí: desde el contenedor backend no alcanza el Ollama del host.
      # Ollama en el host (systemd). Cambia a http://ollama:11434 si usas el servicio Docker.
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      # glm-ocr:latest funciona out-of-the-box; q8_0 (~1.6 GB) solo si GPU ≤2 GB VRAM
      OLLAMA_MODEL: ${OLLAMA_MODEL:-glm-ocr}
      OLLAMA_OCR_ENABLED: ${OLLAMA_OCR_ENABLED:-true}
      OLLAMA_OCR_TIMEOUT_MS: ${OLLAMA_OCR_TIMEOUT_MS:-300000}
      OLLAMA_OCR_WARMUP: ${OLLAMA_OCR_WARMUP:-true}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      REDIS_URL: ${REDIS_URL:-}
    extra_hosts:
      # Permite resolver host.docker.internal → IP del host (para OLLAMA_URL)
      - host.docker.internal:host-gateway
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - coolify

networks:
  coolify:
    name: coolify
    external: true

volumes:
  ollama_data: