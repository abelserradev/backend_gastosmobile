# CI en la raíz del repo backend (Nest + Prisma).
# Ramas: develop + main/master/backend. Branch protection: ver docs/ci-seguridad-github.md
name: CI

on:
  pull_request:
    branches: [main, master, backend, develop]
  push:
    branches: [main, master, backend, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Backend (Nest + Prisma)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci

    steps:
      - uses: actions/checkout@v6

      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias (lockfile estricto)
        run: npm ci

      - name: npm audit — bloquea high/critical
        run: npm audit --audit-level=high

      - name: npm audit — aviso moderate (no bloquea)
        continue-on-error: true
        run: npm audit --audit-level=moderate

      - name: Validar schema Prisma
        run: npx prisma validate

      - name: Tests unitarios
        run: npm test -- --passWithNoTests

      - name: Build NestJS
        run: npm run build
