# Auditoría de dependencias: cada push/PR en ramas protegidas + cron semanal.
name: Security audit

on:
  pull_request:
    branches: [main, master, backend, develop]
  push:
    branches: [main, master, backend, develop]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pnpm-audit:
    name: Dependencias (pnpm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Instalar dependencias (lockfile estricto)
        run: pnpm install --frozen-lockfile

      - name: pnpm audit — bloquea high/critical
        run: pnpm audit --audit-level=high

      - name: pnpm audit — moderate (informativo en cron/PR)
        continue-on-error: true
        run: pnpm audit --audit-level=moderate

      - name: Resumen dependencias directas
        run: pnpm ls --depth=0 || true
