# Deploy manual del recurso API en Coolify (webhook de “Deploy” del recurso Nest).
#
# Secret → Actions (este repo): COOLIFY_WEBHOOK_BACKEND = URL completa del webhook Coolify.
# Opcional: jobs.trigger.environment + Environment secrets en GitHub.
name: Deploy Coolify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar webhook Coolify (backend)
        env:
          WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_BACKEND }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::error::Definí el repository secret COOLIFY_WEBHOOK_BACKEND con la URL del Deploy Webhook."
            exit 1
          fi
          echo "Disparando deploy backend..."
          code="$(curl -sS -o /tmp/coolify_body -w "%{http_code}" \
            -X POST "$WEBHOOK" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data '{}' \
            --max-time 120 \
            --retry 2 \
            --retry-delay 3)"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Webhook respondió HTTP $code"
            head -c 512 /tmp/coolify_body >&2 || true
            exit 1
          fi
          echo "Deploy solicitado. Revisá Coolify."
